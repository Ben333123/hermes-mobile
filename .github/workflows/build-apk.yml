name: Build Hermes Mobile APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Patch build.gradle for Linux
        run: |
          # Fix Chaquopy: Python 3.11 → 3.12, Windows path → Linux python3
          sed -i 's/version "3.11"/version "3.12"/' android/app/build.gradle
          sed -i 's|buildPython "C:/Program Files/Python311/python.exe"|buildPython "python3"|' android/app/build.gradle
          echo "=== Patched build.gradle (Python section) ==="
          grep -A3 'python {' android/app/build.gradle || true

      - name: Install Android SDK cmdline-tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd /tmp
          curl -L -o cmdline-tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip"
          unzip -q cmdline-tools.zip
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses 2>/dev/null || true
          sdkmanager --sdk_root=$ANDROID_HOME \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools"

      - name: Install npm dependencies
        run: npm ci

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          ./gradlew assembleDebug --no-daemon --console=plain

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-mobile-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
