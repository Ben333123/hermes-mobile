<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f5f7fb" />
    <link rel="icon" type="image/png" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="shortcut icon" href="./apple-touch-icon.png" />
    <title>Hermes</title>
    <style>
      :root {
        --hermes-safe-top: env(safe-area-inset-top, 0px);
        --hermes-safe-right: env(safe-area-inset-right, 0px);
        --hermes-safe-bottom: env(safe-area-inset-bottom, 0px);
        --hermes-safe-left: env(safe-area-inset-left, 0px);
        color-scheme: light dark;
        background: #f5f7fb;
      }

      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #f5f7fb;
        color: #111827;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding:
          calc(24px + var(--hermes-safe-top))
          calc(20px + var(--hermes-safe-right))
          calc(24px + var(--hermes-safe-bottom))
          calc(20px + var(--hermes-safe-left));
        box-sizing: border-box;
      }

      .boot {
        width: min(84vw, 420px);
        display: grid;
        gap: 16px;
        text-align: center;
      }

      .mark {
        width: 52px;
        height: 52px;
        margin: 0 auto;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f9fafb;
        font-size: 24px;
        font-weight: 800;
        box-shadow: 0 16px 36px rgba(15, 23, 42, 0.18);
      }

      h1 {
        margin: 0;
        color: #111827;
        font-size: 24px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #5f6b7a;
        font-size: 15px;
        line-height: 1.65;
      }

      .bar {
        height: 3px;
        overflow: hidden;
        border-radius: 999px;
        background: #e5e7eb;
      }

      .bar span {
        display: block;
        width: 36%;
        height: 100%;
        border-radius: inherit;
        background: #111827;
        animation: boot 1.2s ease-in-out infinite;
      }

      @keyframes boot {
        0% {
          transform: translateX(-120%);
        }
        55% {
          width: 58%;
        }
        100% {
          transform: translateX(330%);
        }
      }
    </style>
    <script src="./hermes-mobile-bridge.js"></script>
  </head>
  <body>
    <main id="root">
      <section class="boot" aria-label="Hermes">
        <div class="mark">H</div>
        <h1>Hermes</h1>
        <p>正在启动</p>
        <div class="bar" aria-hidden="true"><span></span></div>
      </section>
    </main>
  </body>
</html>
